services:
  postgres:
    image: postgres:15-alpine
    container_name: group36-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conduit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conduit"]
      interval: 5s
      timeout: 5s
      retries: 10

  realworld-api:
    image: node:18
    container_name: group36-realworld-api
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/conduit
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/conduit
      JWT_SECRET: group36-dev-secret
      NODE_ENV: production
      NPM_CONFIG_PRODUCTION: "false"
      PORT: 3000
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules
    command: >
      sh -c "npm ci --include=dev &&
      npx prisma generate --schema src/prisma/schema.prisma &&
      npx prisma migrate deploy --schema src/prisma/schema.prisma &&
      npx ts-node --transpile-only --compiler-options '{\"module\":\"CommonJS\"}' src/main.ts"

volumes:
  postgres-data:
  api-node-modules: